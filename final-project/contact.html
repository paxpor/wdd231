<!DOCTYPE html>

<head>

<meta name="description" content="Contact Grand & Son's Workshop for custom woodworking and handcrafted products.">

<meta property="og:description" content="Get in touch for custom woodworking projects and handcrafted wooden products.">

<meta property="og:image" content="https://paxpor.github.io/wdd231/final-project/images/hero.jpg">
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/larger.css">
<script type="module" src="scripts/main.js"></script>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <h1>Contact</h1>
    <button id="menu-btn" aria-expanded="false" aria-label="Toggle Navigation">☰</button>

    <nav id="site-nav" class="nav">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">
  <img src="images/hero.jpg" alt="Contact us">
  <div class="hero-text"><h2>Contact Us</h2></div>
</section>

<main class="section">
  <form method="get" action="thankyou.html" class="contact-form">

    <label for="name">Name</label>
    <input id="name" type="text" name="name" required placeholder="Your name">

    <label for="email">Email</label>
    <input id="email" type="email" name="email" required placeholder="your@email.com">

    <label for="message">Message</label>
    <textarea id="message" name="message" required placeholder="Your message"></textarea>

    <button type="submit" class="btn">Send</button>
  </form>
</main>

<footer class="site-footer">
  <p>&copy; <span id="year"></span></p>
  <p>Last Modified: <span id="lastModified"></span></p>
  <p><a href="attributions.html">Attributions</a></p>
</footer>

</body>
</html>
